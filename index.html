<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia - L'Émotion en Grand Écran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <span>Cinévia</span>
            </div>

            <div class="search-nav">
                <input type="text" id="searchInput" placeholder="Rechercher un film...">
            </div>

            <ul class="nav-links">
                <li><a href="#">Accueil</a></li>
                <li><a href="#movieGrid">Films</a></li>
                <li><a href="#favoritesGrid">Favoris</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Cinévia : L'Émotion en Grand Écran</h1>
        </div>
    </section>

    <main class="container">
        
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Tous</button>
                <button class="filter-btn" data-filter="Action">Action</button>
                <button class="filter-btn" data-filter="comédie">Comédie</button>
                <button class="filter-btn" data-filter="Drame">Drame</button>
            </div>
            <h2 class="section-title">Films populaires</h2>
        </div>

        <div class="cards-grid" id="movieGrid"></div>

        <h2 class="section-title" style="margin-top: 60px;">Mes Favoris ❤️</h2>
        <div class="cards-grid" id="favoritesGrid"></div>

    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImg" src="" alt="">
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p id="modalGenre"></p>
                    <p id="modalDesc"></p>
                    <div id="modalFooter"></div>
                </div>
            </div>
        </div>
    </div>
<footer class="footer">
        <p>&copy; 2026 Cinevia - Tous droits réservés</p>
    </footer>

    <script src="script.js"></script>
</body>
    <script src="script.js"></script>
</body>
</html>
